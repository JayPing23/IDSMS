name: Validate Required Secrets

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-secrets:
    name: Validate repository secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are set
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          missing=false
          for v in DATABASE_URL NEXTAUTH_SECRET GEMINI_API_KEY RESEND_API_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing secret: $v"
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            echo "One or more required secrets are missing. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
